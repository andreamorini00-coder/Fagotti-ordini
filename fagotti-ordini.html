<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--nero:#1a1207;--oro:#c9a84c;--oro-l:#fdf5e0;--cream:#faf8f5;--brd:#e0d8cc}
body{font-family:Georgia,serif;background:var(--cream);color:var(--nero);min-height:100vh}

.ls{color:#aaa;font-family:sans-serif;font-size:11px;letter-spacing:3px;text-transform:uppercase}

.hdr{background:var(--nero);padding:13px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.3)}

.hs{color:var(--oro);font-family:sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase}
.sy{display:flex;align-items:center;gap:5px}
.nav{display:flex;background:#fff;border-bottom:2px solid var(--brd);position:sticky;top:57px;z-index:99}
.nb{flex:1;padding:12px 4px;background:transparent;color:#666;border:none;cursor:pointer;font-family:sans-serif;font-size:12px;font-weight:600}
.nb.on{background:var(--nero);color:var(--oro)}
.content{padding:14px;max-width:600px;margin:0 auto;width:100%;flex:1}
.view{display:none}.view.on{display:block}
.wnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.wb{background:#fff;border:1px solid var(--brd);border-radius:8px;padding:8px 14px;cursor:pointer;font-size:20px;color:var(--nero)}
.wt{text-align:center}

.dacc{margin-bottom:8px;border-radius:12px;overflow:hidden;border:1px solid var(--brd);background:#fff}

.dacc.today .dtr{background:var(--nero)}
.dn{font-weight:700;font-size:14px;font-family:sans-serif;color:var(--nero)}
.dacc.today .dn{color:var(--oro)}
.dr{display:flex;align-items:center;gap:8px}
.dc{border-radius:12px;padding:2px 10px;font-family:sans-serif;font-size:12px;font-weight:700;color:#fff;background:#ccc}
.dc.has{background:var(--oro)}
.da{font-size:14px;color:#888;transition:transform .2s;display:inline-block}
.dacc.today .da{color:#aaa}
.dbody{display:none}.dbody.open{display:block}
.or{padding:11px 14px;border-top:1px solid #f5f0e8;display:flex;justify-content:space-between;align-items:flex-start}
.oc{font-weight:700;font-size:15px}
.op{font-family:sans-serif;font-size:13px;color:#555;margin-top:2px;line-height:1.7}
.obs{margin-top:4px;display:flex;flex-wrap:wrap;gap:4px}
.bg{font-size:10px;padding:2px 7px;border-radius:10px;font-family:sans-serif}
.bgp{background:#dcfce7;color:#166534}.bgc{background:#fff7ed;color:#9a3412}
.onote{font-family:sans-serif;font-size:11px;color:#888;margin-top:3px;font-style:italic}
.oprice{font-family:sans-serif;font-size:13px;font-weight:700;margin-top:3px}
.oa{display:flex;gap:6px;margin-left:10px;flex-shrink:0}
.bi{background:none;border:1px solid;border-radius:8px;padding:6px 10px;cursor:pointer;font-size:14px;min-width:36px;min-height:36px}
.be{border-color:#3b82f633;color:#3b82f6}.bd{border-color:#ef444433;color:#ef4444}
.ed{padding:10px 14px;color:#ccc;font-family:sans-serif;font-size:13px;font-style:italic}
.wtot{text-align:center;margin-bottom:14px}
.wtot span{background:var(--oro);color:#fff;border-radius:20px;padding:4px 16px;font-family:sans-serif;font-size:13px;font-weight:700}
.pc{margin-bottom:12px;border-radius:12px;overflow:hidden;border:1px solid var(--brd);background:#fff}
.ph{background:var(--nero);padding:10px 14px;display:flex;justify-content:space-between;align-items:center}
.pd{color:var(--oro);font-weight:700;font-family:sans-serif;font-size:14px}
.pi2{color:#aaa;font-family:sans-serif;font-size:12px}
.pit{padding:9px 14px;border-top:1px solid #f0ebe0}
.pih{display:flex;justify-content:space-between;align-items:center}
.pn{font-weight:700;font-size:14px}
.pq{background:#f0ebe0;border-radius:20px;padding:2px 12px;font-family:sans-serif;font-size:13px;font-weight:700}
.pdt{font-family:sans-serif;font-size:12px;color:#666;margin-top:3px}

.tc{margin-top:8px;border-radius:12px;overflow:hidden;border:2px solid var(--oro)}
.th{background:var(--oro);padding:10px 14px}

.tr2{padding:8px 14px;border-top:1px solid #f0ebe0;display:flex;justify-content:space-between;font-family:sans-serif;font-size:13px;background:#fff}
.tn{font-weight:700;color:var(--oro)}
.fw{background:#fff;border-radius:16px;border:1px solid var(--brd);overflow:hidden}
.fh{background:var(--nero);padding:13px 18px}

.fb{padding:18px;display:flex;flex-direction:column;gap:14px}
.fl{display:block;font-family:sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#888;margin-bottom:6px}

.qinp{width:64px;text-align:center;font-family:sans-serif;font-size:20px;font-weight:700;border:1px solid var(--brd);border-radius:10px;padding:6px 2px;background:#fafaf8;color:var(--nero);outline:none}
.qb{width:44px;height:44px;border-radius:10px;border:1px solid var(--brd);background:#fff;cursor:pointer;font-size:24px;color:var(--nero);display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1;font-family:sans-serif}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:6px}
.ch{padding:7px 13px;border-radius:20px;border:1px solid var(--brd);background:#fff;cursor:pointer;font-family:sans-serif;font-size:13px;color:#666}
.ch.on{border:2px solid var(--oro);background:var(--oro-l);color:var(--nero);font-weight:700}

.prebox{background:#f0f9ff;border:1px solid #bae6fd;border-radius:10px;padding:12px 14px;margin-top:8px}
.pretot{font-family:sans-serif;font-size:20px;font-weight:700;color:var(--nero);margin-top:4px}
.predet{font-family:sans-serif;font-size:12px;color:#666;margin-top:2px}
.subb{padding:16px;border:none;border-radius:12px;font-family:sans-serif;font-size:16px;font-weight:700;cursor:pointer;background:var(--nero);color:var(--oro);width:100%}

.canb{padding:12px;background:none;border:1px solid var(--brd);border-radius:12px;font-family:sans-serif;font-size:14px;cursor:pointer;color:#666;width:100%;margin-top:6px}
.tipo-sel{display:flex;gap:10px}

.tipo-btn.on-t{border-color:var(--oro);background:var(--oro-l);color:var(--nero)}
.tipo-btn.on-s{border-color:#d97706;background:#fffbeb;color:#92400e}
.ibox{border-radius:10px;padding:12px;margin-bottom:8px;position:relative}
.ibox.t{background:#fffdf5;border:1px solid #e8d88a}
.ibox.s{background:#fffbeb;border:1px solid #fde68a}
.inum{font-family:sans-serif;font-size:11px;font-weight:700;color:#888;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.idel{position:absolute;top:8px;right:8px;background:none;border:1px solid #ef444433;border-radius:8px;color:#ef4444;cursor:pointer;font-size:12px;padding:3px 8px}

.add-btn.s{border-color:#fde68a;color:#d97706}

.och{padding:7px 11px;border-radius:20px;border:1px solid var(--brd);background:#fff;cursor:pointer;font-family:sans-serif;font-size:13px;color:var(--nero)}
.och:active{background:var(--oro-l);border-color:var(--oro)}

function wDates(off){var n=new Date(),dy=n.getDay(),di=n.getDate()-dy+(dy===0?-6:1)+off*7;var mo=new Date(new Date().setDate(di));return Array.from({length:7},function(_,i){var d=new Date(mo);d.setDate(mo.getDate()+i);return d.toISOString().split("T")[0];});}
function opg(d){return ordini.filter(function(o){return o.data===d;}).sort(function(a,b){var oa=orMin(a.orario),ob=orMin(b.orario);return oa!==ob?oa-ob:(a.cliente||"").localeCompare(b.cliente||"");});}

// CALC
function calcT(t){
  var pk=parseFloat(t.prezzoKg)||LISTINO[t.prodotto]||0;
  var kg=0;
  if(t.modo==="kg") kg=p2kg(t.peso||"1kg")*(t.qtaTorte||1);
  else if(t.modo==="pers") kg=cKg(t.persone||8,t.grammi||150)*(t.qtaTorte||1);
  return pk*kg;
}
function calcTot(o){
  var tot=0;
  if(o.prodotto) tot+=calcT({prodotto:o.prodotto,modo:o.modo||(o.modoKg===false?"pers":"kg"),peso:o.peso,persone:o.persone,grammi:o.grammi,qtaTorte:o.qtaTorte,prezzoKg:o.prezzoKg});
  if(o.torteExtra) o.torteExtra.forEach(function(t){tot+=calcT(t);});
  if(o.consegna) tot+=10;
  return tot;
}

function tLine(t){
  var pw="";
  if(t.modo==="kg") pw=t.peso||"1kg";
  else if(t.modo==="pz") pw=(t.pezzi||1)+" pz";
  else pw=(t.persone||8)+"p (~"+cKg(t.persone||8,t.grammi||150).toFixed(2)+"kg)";
  var l="🎂 "+xe(t.prodotto)+" · "+pw;
  if(t.modo!=="pz"&&(t.qtaTorte||1)>1) l+=" × "+(t.qtaTorte)+" torte";
  if(t.farcitura) l+=" | "+xe(t.farcitura);
  if(t.decorazione) l+=" | "+xe(t.decorazione);
  return l;
}
function sLine(s){
  var sw=s.salModo==="kg"||s.modo==="kg"?(s.salPeso||s.peso||"1kg"):(s.salQta||s.qta||1)+" pz";
  return "🥗 "+xe(s.salProdotto||s.prodotto)+" · "+sw;
}

// PRODUZIONE
function rP(){
  var dates=wDates(wOff);
  var h='<div class="wnav"><button class="wb" onclick="chW(-1)">&#8249;</button><div class="wt"><div class="wm">Piano di produzione</div><div class="wd">'+fdf(dates[0])+" &mdash; "+fdf(dates[6])+'</div></div><button class="wb" onclick="chW(1)">&#8250;</button></div>';
  var totM={},any=false;
  dates.forEach(function(date,i){
    var day=opg(date);if(!day.length)return;any=true;
    var bp={};
    day.forEach(function(o){
      function addK(k,q){if(!bp[k])bp[k]=[];bp[k].push({o:o});totM[k]=(totM[k]||0)+q;}
      if(o.prodotto) addK(o.prodotto,o.modo==="pz"?(o.pezzi||1):(o.qtaTorte||1));
      if(o.torteExtra) o.torteExtra.forEach(function(t){addK(t.prodotto,t.modo==="pz"?(t.pezzi||1):(t.qtaTorte||1));});
      if(o.salProdotto) addK(o.salProdotto,o.salModo==="pz"?(o.salQta||1):1);
      if(o.salatiExtra) o.salatiExtra.forEach(function(s){addK(s.prodotto,s.modo==="pz"?(s.qta||1):1);});
    });
    h+='<div class="pc"><div class="ph"><span class="pd">'+GIORNI[i]+' '+fd(date)+'</span><span class="pi2">'+day.length+' ordini</span></div>';
    Object.keys(bp).forEach(function(prod){
      var items=bp[prod],tq=totM[prod];
      h+='<div class="pit"><div class="pih"><span class="pn">'+xe(prod)+'</span><span class="pq">× '+tq+'</span></div>';
      var seen={};
      items.forEach(function(x){
        var o=x.o,key=o.id+prod;if(seen[key])return;seen[key]=1;
        var det=[],tot=calcTot(o);
        if(o.prodotto===prod){var pw=o.modo==="pz"?(o.pezzi||1)+" pz":(o.modo==="kg"?(o.peso||"1kg"):(o.persone||8)+"p");det.push(pw);if(o.orario)det.push("⏰"+o.orario);if(o.farcitura)det.push("farc:"+o.farcitura);if(o.decorazione)det.push(o.decorazione);if(o.consegna)det.push("🚗");}
        if(o.salProdotto===prod){det.push(o.salModo==="kg"?(o.salTarget||"1kg"):(o.salQta||1)+" pz");}
        if(o.torteExtra) o.torteExtra.forEach(function(t){if(t.prodotto===prod)det.push(t.modo==="pz"?(t.pezzi||1)+" pz":(t.modo==="kg"?(t.peso||"1kg"):(t.persone||8)+"p"));});
        if(o.salatiExtra) o.salatiExtra.forEach(function(s){if(s.prodotto===prod)det.push(s.modo==="pz"?(s.qta||1)+" pz":(s.peso||"1kg"));});
        h+='<div class="pdt">— '+xe(o.cliente)+(det.length?' · <span>'+det.join(" · ")+'</span>':'')+(tot>0?' · <span>€'+tot.toFixed(2)+'</span>':'')+'</div>';
      });
      h+='</div>';
    });
    h+='</div>';
  });
  if(!any) h+='<div style="text-align:center;padding:40px;color:#ccc;font-family:sans-serif">Nessun ordine</div>';
  if(Object.keys(totM).length){
    var te=ordini.filter(function(o){return dates.indexOf(o.data)>=0;}).reduce(function(s,o){return s+calcTot(o);},0);
    h+='<div class="tc"><div class="th"><span>📦 Totale settimana'+(te>0?' · € '+te.toFixed(2):'')+'</span></div>';
    Object.keys(totM).sort(function(a,b){return totM[b]-totM[a];}).forEach(function(p){h+='<div class="tr2"><span>'+xe(p)+'</span><span class="tn">× '+totM[p]+'</span></div>';});
    h+='</div>';
  }
  G("v1").innerHTML=h;
}

function printDay(dateSelezionata){
  var dates=wDates(wOff);

  var day=opg(target),nome=GIORNI[gi]||'';
  var rows='';
  day.forEach(function(o){
    var lines=[],tot=calcTot(o);
    if(o.prodotto){var pw=o.modo==='pz'?(o.pezzi||1)+' pz':(o.modo==='kg'?(o.peso||'1kg'):(o.persone||8)+'p');lines.push('🎂 '+xe(o.prodotto)+' · '+pw);}
    if(o.torteExtra)o.torteExtra.forEach(function(t){var pw=t.modo==='pz'?(t.pezzi||1)+' pz':(t.modo==='kg'?(t.peso||'1kg'):(t.persone||8)+'p');lines.push('🎂 '+xe(t.prodotto)+' · '+pw);});
    if(o.salProdotto)lines.push('🥗 '+xe(o.salProdotto));
    if(o.salatiExtra)o.salatiExtra.forEach(function(s){lines.push('🥗 '+xe(s.prodotto));});

    rows+='<tr style="border-bottom:2px solid #ddd">';
    rows+='<td style="padding:18px;font-size:20px"><strong>'+xe(o.cliente)+'</strong>'+(o.orario?'<br><span style="font-size:18px">⏰ '+o.orario+'</span>':'')+'</td>';
    rows+='<td style="padding:18px;font-size:18px">'+lines.join('<br>')+'</td>';
    rows+='<td style="padding:18px;text-align:right;font-size:22px;font-weight:bold">'+(tot>0?'€ '+tot.toFixed(2):'—')+'</td>';
    rows+='</tr>';
  });

  if(!rows) rows='<tr><td colspan="3" style="padding:30px;text-align:center;font-size:20px">Nessun ordine</td></tr>';

  var html='<!DOCTYPE html><html><head><meta charset="UTF-8"><style>';

  html+='table{width:100%;border-collapse:collapse}';
  html+='th{background:#1a1207;color:#fff;padding:16px;font-size:18px;text-align:left}';

      ["500g","1kg","1.5kg","2kg","2.5kg","3kg","4kg","5kg"].forEach(function(p){html+='<button class="ch'+(t.peso===p?" on":"")+'" onclick="tPeso('+i+',''+p+'')">'+p+'</button>';});
      html+='</div>';
    } else if(t.modo==="pz"){
      html+='<div class="row2">';
      html+='<button class="qb" onclick="tAdj('+i+','pz',-1)">&#8722;</button>';
      html+='<input type="number" class="qinp" min="1" value="'+(t.pezzi||1)+'" oninput="TI['+i+'].pezzi=Math.max(1,parseInt(this.value)||1)">';
      html+='<button class="qb" onclick="tAdj('+i+','pz',1)">+</button>';
      html+='<span style="font-family:sans-serif;font-size:13px;color:#888">pz</span></div>';
    } else {
      html+='<div class="row2" style="margin-bottom:8px">';
      html+='<button class="qb" onclick="tAdj('+i+','pe',-1,2)">&#8722;</button>';
      html+='<input type="number" class="qinp" min="2" value="'+(t.persone||8)+'" oninput="TI['+i+'].persone=Math.max(2,parseInt(this.value)||8)">';
      html+='<button class="qb" onclick="tAdj('+i+','pe',1)">+</button></div>';
      html+='<div style="font-family:sans-serif;font-size:13px;color:#666;margin-bottom:4px">Porzione: '+(t.grammi||150)+'g/persona</div>';
      html+='<input type="range" style="width:100%;accent-color:var(--oro);margin:4px 0" min="120" max="170" step="5" value="'+(t.grammi||150)+'" oninput="TI['+i+'].grammi=parseInt(this.value);rTL()">';
      html+='<div style="display:flex;justify-content:space-between;font-family:sans-serif;font-size:11px;color:#bbb"><span>120g</span><span>150g</span><span>170g</span></div>';
      html+='<div class="kgbox">'+cKg(t.persone||8,t.grammi||150).toFixed(2)+' kg × '+(t.qtaTorte||1)+' = <strong>~'+(cKg(t.persone||8,t.grammi||150)*(t.qtaTorte||1)).toFixed(2)+' kg</strong></div>';
    }
    html+='</div>';
    html+='<div style="margin-bottom:8px"><label class="fl">Prezzo &euro;/kg'+(lk?' <span style="font-weight:400;color:#aaa">(listino: €'+lk+'/kg)</span>':'')+' </label>';
    html+='<input class="fi" type="number" step="0.5" value="'+xe(String(pkv))+'" placeholder="&euro;/kg" oninput="TI['+i+'].prezzoKg=this.value">';
    if(prev) html+='<div class="prebox" style="margin-top:6px"><div style="font-family:sans-serif;font-size:11px;color:#0369a1;text-transform:uppercase;letter-spacing:1px">Preventivo</div><div class="pretot">€ '+prev+'</div><div class="predet">'+kg.toFixed(3)+' kg × €'+pkv+'/kg</div></div>';
    html+='</div>';
    html+='<div style="margin-bottom:8px"><label class="fl">Farcitura</label><input class="fi" type="text" value="'+xe(t.farcitura||"")+'" placeholder="Es: fragole, pistacchio..." oninput="TI['+i+'].farcitura=this.value"></div>';
    html+='<div><label class="fl">Decorazione / Scritta</label><input class="fi" type="text" value="'+xe(t.decorazione||"")+'" placeholder="Es: Buon compleanno Marco..." oninput="TI['+i+'].decorazione=this.value"></div>';
    html+='</div>';
  });
  box.innerHTML=html;
}

function tChgProd(i,v){TI[i].prodotto=v;var lk=LISTINO[v]||"";if(lk)TI[i].prezzoKg=lk;rTL();ub();}
function tModo(i,v){TI[i].modo=v;rTL();}
function tPeso(i,p){TI[i].peso=p;rTL();}
function tAdj(i,t,d,mn){
  mn=mn||1;
  if(t==="qt") TI[i].qtaTorte=Math.max(mn,(TI[i].qtaTorte||1)+d);
  if(t==="pe") TI[i].persone=Math.max(mn,(TI[i].persone||8)+d);
  if(t==="pz") TI[i].pezzi=Math.max(mn,(TI[i].pezzi||1)+d);
  rTL();
}

// SALATI
function addSalato(){SI.push(newS());rSL();}
function removeSalato(i){SI.splice(i,1);rSL();ub();}

function rSL(){
  var box=G("salati-list");if(!box)return;
  var html="";
  SI.forEach(function(s,i){
    var isKg=SAL_KG.indexOf(s.prodotto)>=0;
    html+='<div class="ibox s">';
    if(SI.length>1) html+='<button class="idel" onclick="removeSalato('+i+')">✕</button><div class="inum">Salato '+(i+1)+'</div>';
    html+='<div style="margin-bottom:8px"><label class="fl">Prodotto</label>';
    html+='<input class="fi" type="text" list="dl-s" value="'+xe(s.prodotto)+'" placeholder="Es: Tramezzini, Pizzette..." autocomplete="off"';
    html+=' oninput="SI['+i+'].prodotto=this.value"';
    html+=' onchange="sChgProd('+i+',this.value)"></div>';
    if(s.prodotto){
      if(isKg){
        html+='<div><label class="fl">Peso</label><div class="chips">';
        ["0.5kg","1kg","1.5kg","2kg","3kg","4kg","5kg"].forEach(function(p){html+='<button class="ch'+(s.peso===p?" on":"")+'" onclick="sPeso('+i+',''+p+'')">'+p+'</button>';});
        html+='</div></div>';
      } else {
        html+='<div><label class="fl">Quantit&agrave; (pz)</label><div class="row2">';
        html+='<button class="qb" onclick="sAdj('+i,-1)">&#8722;</button>';
        html+='<input type="number" class="qinp" min="1" value="'+(s.qta||1)+'" oninput="SI['+i+'].qta=Math.max(1,parseInt(this.value)||1)">';
        html+='<button class="qb" onclick="sAdj('+i,1)">+</button>';
        html+='<span style="font-family:sans-serif;font-size:13px;color:#888">pz</span></div></div>';
      }
    }
    html+='</div>';
  });
  box.innerHTML=html;
}

function sChgProd(i,v){SI[i].prodotto=v;SI[i].modo=SAL_KG.indexOf(v)>=0?"kg":"pz";rSL();ub();}
function sPeso(i,p){SI[i].peso=p;rSL();}
function sAdj(i,d){SI[i].qta=Math.max(1,(SI[i].qta||1)+d);rSL();}

// UB
function ub(){
  var cl=G("fc").value.trim(),ok=false;
  if(fHasT&&TI.some(function(t){return t.prodotto.trim();})) ok=true;
  if(fHasS&&SI.some(function(s){return s.prodotto.trim();})) ok=true;
  G("sbtn").disabled=!(cl&&ok);
}

// FOTO
function updFoto(){var v=G("fnref").value.trim();var p=G("foto-prev"),l=G("foto-lnk");if(v&&v.startsWith("http")){p.style.display="block";l.href=v;}else{p.style.display="none";}}

// SUBMIT
function doSub(){
  var cl=G("fc").value.trim();if(!cl)return;
  var id=editId||String(Date.now());
  var o={id:id,cliente:cl,telefono:G("ftel").value,data:G("fdata").value,orario:G("forario").value||null,consegna:fConsegna,noteRif:G("fnref").value||null,note:G("fnote").value||null};
  if(fHasT&&TI.length>0){
    var vt=TI.filter(function(t){return t.prodotto.trim();});
    if(vt.length>0){
      var t0=vt[0],pk0=parseFloat(t0.prezzoKg)||LISTINO[t0.prodotto]||0;
      Object.assign(o,{prodotto:t0.prodotto,modo:t0.modo,peso:t0.peso,persone:t0.persone,grammi:t0.grammi,qtaTorte:t0.qtaTorte,pezzi:t0.pezzi,prezzoKg:pk0,farcitura:t0.farcitura||null,decorazione:t0.decorazione||null});
      if(vt.length>1) o.torteExtra=vt.slice(1).map(function(t){return{prodotto:t.prodotto,modo:t.modo,peso:t.peso,persone:t.persone,grammi:t.grammi,qtaTorte:t.qtaTorte,pezzi:t.pezzi,prezzoKg:parseFloat(t.prezzoKg)||LISTINO[t.prodotto]||0,farcitura:t.farcitura||null,decorazione:t.decorazione||null};});
    }
  }
  if(fHasS&&SI.length>0){
    var vs=SI.filter(function(s){return s.prodotto.trim();});
    if(vs.length>0){
      var s0=vs[0],isK0=SAL_KG.indexOf(s0.prodotto)>=0;
      Object.assign(o,{salProdotto:s0.prodotto,salModo:isK0?"kg":"pz",salPeso:s0.peso||"1kg",salQta:s0.qta||1});
      if(vs.length>1) o.salatiExtra=vs.slice(1).map(function(s){var isK=SAL_KG.indexOf(s.prodotto)>=0;return{prodotto:s.prodotto,modo:isK?"kg":"pz",peso:s.peso||"1kg",qta:s.qta||1};});
    }
  }
  var btn=G("sbtn");btn.disabled=true;btn.textContent="Salvataggio...";
  saveO(o).then(function(){resetForm();goAgenda();}).catch(function(e){alert("Errore: "+e.message);btn.disabled=false;btn.textContent=editId?"✓ Salva modifiche":"✓ Aggiungi ordine";});
}

// DELETE / EDIT
function doDel(id){if(!confirm("Eliminare questo ordine?"))return;delO(id);}
function doEdit(id){
  var o=ordini.filter(function(x){return String(x.id)===String(id);})[0];if(!o)return;
  editId=String(o.id);
  G("fc").value=o.cliente||"";G("ftel").value=o.telefono||"";G("fdata").value=o.data||td();
  G("forario").value=o.orario||"";G("fnref").value=o.noteRif||"";G("fnote").value=o.note||"";
  fConsegna=!!o.consegna;G("btn-ritiro").classList.toggle("on",!fConsegna);G("btn-cons").classList.toggle("on",fConsegna);
  fHasT=false;fHasS=false;TI=[];SI=[];
  if(o.prodotto){
    fHasT=true;
    TI.push({prodotto:o.prodotto,modo:o.modo||(o.modoKg===false?"pers":"kg"),peso:o.peso||"1kg",persone:o.persone||8,grammi:o.grammi||150,qtaTorte:o.qtaTorte||1,pezzi:o.pezzi||1,prezzoKg:o.prezzoKg||LISTINO[o.prodotto]||"",farcitura:o.farcitura||"",decorazione:o.decorazione||""});
    if(o.torteExtra) o.torteExtra.forEach(function(t){TI.push({prodotto:t.prodotto,modo:t.modo||"kg",peso:t.peso||"1kg",persone:t.persone||8,grammi:t.grammi||150,qtaTorte:t.qtaTorte||1,pezzi:t.pezzi||1,prezzoKg:t.prezzoKg||LISTINO[t.prodotto]||"",farcitura:t.farcitura||"",decorazione:t.decorazione||""});});
    rTL();
  }
  if(o.salProdotto){
    fHasS=true;
    SI.push({prodotto:o.salProdotto,modo:o.salModo||"pz",peso:o.salPeso||"1kg",qta:o.salQta||1});
    if(o.salatiExtra) o.salatiExtra.forEach(function(s){SI.push({prodotto:s.prodotto,modo:s.modo||"pz",peso:s.peso||"1kg",qta:s.qta||1});});
    rSL();
  }
  G("tipo-t").className="tipo-btn"+(fHasT?" on-t":"");G("tipo-s").className="tipo-btn"+(fHasS?" on-s":"");
  G("sec-t").style.display=fHasT?"block":"none";G("sec-s").style.display=fHasS?"block":"none";
  updFoto();
  G("sbtn").disabled=false;G("sbtn").textContent="✓ Salva modifiche";
  G("cbtn").style.display="block";G("ftitle").textContent="MODIFICA ORDINE";
  G("t2").textContent="✏️ Modifica";goTab(2);
}

// RESET
function resetForm(){
  G("fc").value="";G("ftel").value="";G("fdata").value=td();G("forario").value="";G("fnref").value="";G("fnote").value="";
  fConsegna=false;fHasT=false;fHasS=false;TI=[];SI=[];
  G("btn-ritiro").classList.add("on");G("btn-cons").classList.remove("on");
  G("tipo-t").className="tipo-btn";G("tipo-s").className="tipo-btn";
  G("sec-t").style.display="none";G("sec-s").style.display="none";
  G("foto-prev").style.display="none";
  G("sbtn").disabled=true;G("sbtn").textContent="✓ Aggiungi ordine";
  G("cbtn").style.display="none";G("ftitle").textContent="NUOVO ORDINE";editId=null;
}
</script>
</body>
</html>
